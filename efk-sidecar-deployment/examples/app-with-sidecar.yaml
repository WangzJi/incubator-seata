---
# 业务应用示例 - 集成 Fluent Bit Sidecar
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sample-app
  namespace: your-namespace  # 替换为你的 namespace
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sample-app
  template:
    metadata:
      labels:
        app: sample-app
    spec:
      containers:
      # ============ 你的业务容器 ============
      - name: app
        image: your-app-image:latest  # 替换为你的应用镜像
        ports:
        - containerPort: 8080
        env:
        - name: LOG_PATH
          value: "/var/log/app"
        volumeMounts:
        # 共享日志目录
        - name: app-logs
          mountPath: /var/log/app
        resources:
          limits:
            memory: 512Mi
            cpu: 500m
          requests:
            memory: 256Mi
            cpu: 250m

      # ============ Fluent Bit Sidecar 容器 ============
      - name: fluent-bit
        image: fluent/fluent-bit:2.2.0
        volumeMounts:
        # 挂载共享日志目录（读取应用日志）
        - name: app-logs
          mountPath: /var/log/app
          readOnly: true
        # 挂载 Fluent Bit 配置
        - name: fluent-bit-config
          mountPath: /fluent-bit/etc/fluent-bit.conf
          subPath: fluent-bit.conf
        - name: fluent-bit-config
          mountPath: /fluent-bit/etc/parsers.conf
          subPath: parsers.conf
        resources:
          limits:
            memory: 200Mi
            cpu: 200m
          requests:
            memory: 100Mi
            cpu: 100m

      # ============ Volumes 定义 ============
      volumes:
      # 共享日志目录（emptyDir）
      - name: app-logs
        emptyDir: {}
      # Fluent Bit 配置
      - name: fluent-bit-config
        configMap:
          name: fluent-bit-config
---
# Service 示例（如果需要）
apiVersion: v1
kind: Service
metadata:
  name: sample-app
  namespace: your-namespace
spec:
  selector:
    app: sample-app
  ports:
  - port: 8080
    targetPort: 8080
