name: Release Drafter (Chinese)

on:
  push:
    branches:
      - 2.x
  pull_request:
    types: [opened, reopened, synchronize]
    branches:
      - 2.x

permissions:
  contents: read

jobs:
  update_release_draft:
    permissions:
      contents: write
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      # Update draft release
      - uses: release-drafter/release-drafter@v5
        id: release-drafter
        with:
          config-name: release-drafter-zh.yml
          name: 'Apache Seata v$RESOLVED_VERSION (中文版)'
          tag: 'v$RESOLVED_VERSION-zh'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      # Checkout repository to save changelog
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          
      # Save Chinese changelog using translation script
      - name: Save Chinese Changelog
        run: |
          # Create changes directory if it doesn't exist
          mkdir -p changes/zh-cn
          
          # Create temporary English content file
          cat > /tmp/en-content.md << 'EOF'
          ${{ steps.release-drafter.outputs.body }}
          EOF
          
          # Make translation script executable
          chmod +x scripts/translate-changelog.sh
          
          # Generate translated Chinese content
          TRANSLATED_CONTENT=$(scripts/translate-changelog.sh /tmp/en-content.md /dev/stdout 2>/dev/null || echo '${{ steps.release-drafter.outputs.body }}')
          
          # Create Chinese changelog file
          cat > changes/zh-cn/2.x.md << EOF
          <!--
              Licensed to the Apache Software Foundation (ASF) under one or more
              contributor license agreements.  See the NOTICE file distributed with
              this work for additional information regarding copyright ownership.
              The ASF licenses this file to You under the Apache License, Version 2.0
              (the "License"); you may not use this file except in compliance with
              the License.  You may obtain a copy of the License at

              http://www.apache.org/licenses/LICENSE-2.0
              
              Unless required by applicable law or agreed to in writing, software
              distributed under the License is distributed on an "AS IS" BASIS,
              WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND, either express or implied.
              See the License for the specific language governing permissions and
              limitations under the License.
          -->
          所有提交到 2.x 分支的 PR 请在此处登记。

          <!-- 请根据PR的类型添加 \`变更记录\` 到以下对应位置(feature/bugfix/optimize/test) 下 -->

          $TRANSLATED_CONTENT
          
          非常感谢以下 contributors 的代码贡献。若有无意遗漏，请报告。

          <!-- 请确保您的 GitHub ID 在以下列表中 -->

          同时，我们收到了社区反馈的很多有价值的issue和建议，非常感谢大家。
          EOF
          
      # Commit and push changes
      - name: Commit changelog updates
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add changes/zh-cn/2.x.md
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "docs: auto-update Chinese changelog for 2.x branch

            - Generated by release-drafter with auto-translation
            - Updated: $(date -u +'%Y-%m-%d %H:%M:%S UTC')
            - Release version: ${{ steps.release-drafter.outputs.tag_name }}"
            git push 