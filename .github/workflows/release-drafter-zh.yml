name: Release Drafter (Chinese) - TEST

on:
  push:
    branches:
      - experiment/auto-changelog
  pull_request_target:
    types: [opened, reopened, synchronize, edited]
    branches:
      - experiment/auto-changelog

permissions:
  contents: read

jobs:
  update_release_draft:
    permissions:
      contents: write
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      # Checkout repository first to access config files
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          
      # Update draft release
      - uses: release-drafter/release-drafter@v5
        id: release-drafter
        with:
          config-name: release-drafter-zh.yml
          name: 'Apache Seata v$RESOLVED_VERSION (测试-中文)'
          tag: 'v$RESOLVED_VERSION-test-zh'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
      # Install translation dependencies
      - name: Setup Translation Environment (TEST)
        run: |
          chmod +x scripts/translate-changelog.sh
          # Check if translation dictionary exists
          if [ ! -f scripts/translation-dictionary.txt ]; then
            echo "Warning: Translation dictionary not found"
          fi
          
      # Save and translate changelog 
      - name: Save Chinese Changelog (TEST)
        run: |
          # Create test changes directory if it doesn't exist
          mkdir -p changes/test/zh-cn
          
          # Get English changelog content
          ENGLISH_CONTENT=$(cat << 'EOF'
          ${{ steps.release-drafter.outputs.body }}
          EOF
          )
          
          # Create temporary English file and translate
          echo "$ENGLISH_CONTENT" > temp_english.md
          ./scripts/translate-changelog.sh temp_english.md temp_chinese.md || echo "Translation failed, using original content"
          
          # Create final Chinese changelog
          cat > changes/test/zh-cn/experiment.md << 'EOF'
          <!--
              Licensed to the Apache Software Foundation (ASF) under one or more
              contributor license agreements.  See the NOTICE file distributed with
              this work for additional information regarding copyright ownership.
              The ASF licenses this file to You under the Apache License, Version 2.0
              (the "License"); you may not use this file except in compliance with
              the License.  You may obtain a copy of the License at

              http://www.apache.org/licenses/LICENSE-2.0
              
              Unless required by applicable law or agreed to in writing, software
              distributed under the License is distributed on an "AS IS" BASIS,
              WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND, either express or implied.
              See the License for the specific language governing permissions and
              limitations under the License.
          -->
          为提交到 experiment/auto-changelog 分支的所有 PR 在此处添加变更（测试）。

          <!-- 请根据 PR 类型将 \`changes\` 添加到以下位置（功能/修复/优化/测试） -->

          EOF
          
          # Append translated content
          if [ -f temp_chinese.md ]; then
            cat temp_chinese.md >> changes/test/zh-cn/experiment.md
          else
            # Fallback: add original English content with note
            echo "<!-- 注意：自动翻译失败，以下为英文原文 -->" >> changes/test/zh-cn/experiment.md
            echo "$ENGLISH_CONTENT" >> changes/test/zh-cn/experiment.md
          fi
          
          cat >> changes/test/zh-cn/experiment.md << 'EOF'
          
          感谢这些贡献者的代码提交。如有遗漏请报告。

          <!-- 请确保您的 GitHub ID 在以下列表中 -->

          同时，我们从社区收到了许多宝贵的问题、疑问和建议。感谢大家。
          EOF
          
          # Clean up temporary files
          rm -f temp_chinese.md temp_english.md
          
      # Commit and push changes
      - name: Commit changelog updates (TEST)
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add changes/test/zh-cn/experiment.md
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "docs: auto-update Chinese changelog for experiment branch (测试)

            - Generated by release-drafter (测试模式)
            - Updated: $(date -u +'%Y-%m-%d %H:%M:%S UTC')
            - Release version: ${{ steps.release-drafter.outputs.tag_name }}"
            git push 