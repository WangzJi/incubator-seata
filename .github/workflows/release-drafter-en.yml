name: Release Drafter (English) - TEST

on:
  push:
    branches:
      - experiment/auto-changelog
  pull_request_target:
    types: [opened, reopened, synchronize, edited]
    branches:
      - experiment/auto-changelog

permissions:
  contents: read

jobs:
  update_release_draft:
    permissions:
      contents: write
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      # Checkout repository first to access config files
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          
      # Update draft release
      - uses: release-drafter/release-drafter@v5
        id: release-drafter
        with:
          config-name: release-drafter-en.yml
          name: 'Apache Seata v$RESOLVED_VERSION (TEST-EN)'
          tag: 'v$RESOLVED_VERSION-test-en'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
      # Save changelog to changes directory
      - name: Save English Changelog (TEST)
        run: |
          # Create test changes directory if it doesn't exist
          mkdir -p changes/test/en-us
          
          # Extract changelog content from release body
          cat > changes/test/en-us/experiment.md << 'EOF'
          <!--
              Licensed to the Apache Software Foundation (ASF) under one or more
              contributor license agreements.  See the NOTICE file distributed with
              this work for additional information regarding copyright ownership.
              The ASF licenses this file to You under the Apache License, Version 2.0
              (the "License"); you may not use this file except in compliance with
              the License.  You may obtain a copy of the License at

              http://www.apache.org/licenses/LICENSE-2.0
              
              Unless required by applicable law or agreed to in writing, software
              distributed under the License is distributed on an "AS IS" BASIS,
              WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND, either express or implied.
              See the License for the specific language governing permissions and
              limitations under the License.
          -->
          Add changes here for all PR submitted to the experiment/auto-changelog branch (TEST).

          <!-- Please add the \`changes\` to the following location(feature/bugfix/optimize/test) based on the type of PR -->

          ${{ steps.release-drafter.outputs.body }}
          
          Thanks to these contributors for their code commits. Please report an unintended omission.

          <!-- Please make sure your Github ID is in the list below -->

          Also, we receive many valuable issues, questions and advices from our community. Thanks for you all.
          EOF
          
      # Commit and push changes
      - name: Commit changelog updates (TEST)
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add changes/test/en-us/experiment.md
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "docs: auto-update English changelog for experiment branch (TEST)

            - Generated by release-drafter (TEST MODE)
            - Updated: $(date -u +'%Y-%m-%d %H:%M:%S UTC')
            - Release version: ${{ steps.release-drafter.outputs.tag_name }}"
            git push 