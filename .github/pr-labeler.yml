# PR Labeler Configuration
# This configuration helps automatically label PRs based on file changes and patterns

# Based on CONTRIBUTING.md commit message types

# Features (feature: xxxx)
feature:
  - head-branch: ['^feature', 'feature']
  - title: ['^feature:', '^feat:']

'type: feature':
  - head-branch: ['feature/*', 'feat/*']
  - title: '/^feature(\(.+\))?\s*:.*$/i'
  - title: '/^feat(\(.+\))?\s*:.*$/i'

'enhancement':
  - head-branch: ['enhancement/*', 'improve/*']
  - title: '/^enhance(\(.+\))?\s*:.*$/i'
  - title: '/^improve(\(.+\))?\s*:.*$/i'

# Bug fixes (bugfix: xxxx)
bug:
  - head-branch: ['^bugfix', '^fix', 'bugfix', 'fix']
  - title: ['^bugfix:', '^fix:', '^bug:']

'type: bugfix':
  - head-branch: ['bugfix/*', 'fix/*', 'hotfix/*']
  - title: '/^bugfix(\(.+\))?\s*:.*$/i'
  - title: '/^fix(\(.+\))?\s*:.*$/i'

'bug':
  - title: '/^bug(\(.+\))?\s*:.*$/i'

# Documentation (docs: xxxx)
docs:
  - head-branch: ['^docs', 'docs']
  - title: ['^docs:']
  - any: ['docs/**/*', '*.md', 'README*']

'type: docs':
  - changed-files:
    - any-glob-to-any-file: 
      - '**/*.md'
      - 'docs/**/*'
      - 'README*'
      - 'CONTRIBUTING*'
      - 'LICENSE*'
      - 'NOTICE*'
      - 'changes/**/*'
  - head-branch: ['docs/*', 'doc/*', 'documentation/*']
  - title: '/^docs(\(.+\))?\s*:.*$/i'

'documentation':
  - title: '/^documentation(\(.+\))?\s*:.*$/i'

# Refactoring (refactor: xxxx)
refactor:
  - head-branch: ['^refactor', 'refactor']
  - title: ['^refactor:']

'type: refactor':
  - head-branch: ['refactor/*', 'refactoring/*']
  - title: '/^refactor(\(.+\))?\s*:.*$/i'

# Testing (test: xxxx)
test:
  - head-branch: ['^test', 'test']
  - title: ['^test:']
  - any: ['**/test/**/*', '**/*test*']

'type: test':
  - changed-files:
    - any-glob-to-any-file: 
      - '**/test/**/*'
      - '**/*Test.java'
      - '**/*Tests.java'
      - '**/src/test/**/*'
  - head-branch: ['test/*', 'tests/*']
  - title: '/^test(\(.+\))?\s*:.*$/i'

'testing':
  - title: '/^testing(\(.+\))?\s*:.*$/i'

# Performance & Optimization
'optimize':
  - head-branch: ['optimize/*', 'perf/*', 'performance/*']
  - title: '/^optimize(\(.+\))?\s*:.*$/i'
  - title: '/^perf(\(.+\))?\s*:.*$/i'

'type: optimize':
  - head-branch: ['optimize/*', 'perf/*', 'performance/*']
  - title: '/^optimize(\(.+\))?\s*:.*$/i'
  - title: '/^perf(\(.+\))?\s*:.*$/i'

'performance':
  - title: '/^performance(\(.+\))?\s*:.*$/i'

# Security
'security':
  - head-branch: ['security/*']
  - title: '/^security(\(.+\))?\s*:.*$/i'
  - title: '/^sec(\(.+\))?\s*:.*$/i'

'type: security':
  - head-branch: ['security/*']
  - title: '/^security(\(.+\))?\s*:.*$/i'
  - title: '/^sec(\(.+\))?\s*:.*$/i'

# Other improvements (catch-all for chore, maintenance, etc.)
chore:
  - head-branch: ['^chore', 'chore']
  - title: ['^chore:']

'type: chore':
  - head-branch: ['chore/*', 'maintenance/*']
  - title: '/^chore(\(.+\))?\s*:.*$/i'
  - title: '/^maintenance(\(.+\))?\s*:.*$/i'

# Breaking changes
'type: breaking':
  - title: '/^.*!(\(.+\))?\s*:.*$/i'
  - title: '/^breaking(\(.+\))?\s*:.*$/i'

'breaking-change':
  - body: '/BREAKING CHANGE/i'

# Module-specific labels
'module: core':
  - changed-files:
    - any-glob-to-any-file: 'core/**/*'

'module: server':
  - changed-files:
    - any-glob-to-any-file: 'server/**/*'

'module: client':
  - changed-files:
    - any-glob-to-any-file: 'tm/**/*'

'module: config':
  - changed-files:
    - any-glob-to-any-file: 'config/**/*'

'module: discovery':
  - changed-files:
    - any-glob-to-any-file: 'discovery/**/*'

'module: saga':
  - changed-files:
    - any-glob-to-any-file: 'saga/**/*'

'module: console':
  - changed-files:
    - any-glob-to-any-file: 'console/**/*'

# Dependencies
'dependencies':
  - changed-files:
    - any-glob-to-any-file:
      - '**/pom.xml'
      - 'pom.xml'
      - '**/package.json'
      - '**/package-lock.json'
      - '**/yarn.lock' 