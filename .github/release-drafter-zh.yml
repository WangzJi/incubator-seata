# Release Drafter Configuration (Chinese)
name-template: 'v$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'

template: |
  # Apache Seata $RESOLVED_VERSION
  
  我们很兴奋地宣布 Apache Seata $RESOLVED_VERSION 发布！🎉
  
  ## 更新内容
  
  $CHANGES
  
  **完整更新日志**: https://github.com/$OWNER/$REPOSITORY/compare/$PREVIOUS_TAG...v$RESOLVED_VERSION
  
  ## 贡献者
  感谢所有为此版本发布做出贡献的开发者！🙏
  
  $CONTRIBUTORS

categories:
  - title: '🚀 新功能'
    labels:
      - 'feature'
      - 'type: feature'
      - 'enhancement'
      - 'type: enhancement'
  - title: '🐛 问题修复'
    labels:
      - 'bugfix'
      - 'type: bugfix'
      - 'bug'
      - 'type: bug'
      - 'fix'
      - 'type: fix'
  - title: '📚 文档'
    labels:
      - 'docs'
      - 'type: docs'
      - 'documentation'
      - 'type: documentation'
  - title: '🔧 重构'
    labels:
      - 'refactor'
      - 'type: refactor'
      - 'refactoring'
      - 'type: refactoring'
  - title: '🧪 测试'
    labels:
      - 'test'
      - 'type: test'
      - 'testing'
      - 'type: testing'
  - title: '⚡ 性能优化'
    labels:
      - 'optimize'
      - 'type: optimize'
      - 'performance'
      - 'type: performance'
  - title: '🔒 安全修复'
    labels:
      - 'security'
      - 'type: security'
  - title: '🔧 其他改进'
    labels:
      - 'chore'
      - 'type: chore'
      - 'maintenance'
      - 'type: maintenance'

change-template: '- $TITLE @$AUTHOR (#$NUMBER)'
change-title-escapes: '\<*_&'  # 转义markdown字符

# 从changelog中排除特定类型的PR
exclude-labels:
  - 'dependencies'
  - 'skip-changelog'
  - 'invalid'
  - 'duplicate'
  - 'wontfix'

# 版本递增规则 (基于CONTRIBUTING.md)
version-resolver:
  major:
    labels:
      - 'major'
      - 'type: breaking'
      - 'breaking-change'
  minor:
    labels:
      - 'minor'
      - 'feature'
      - 'type: feature'
      - 'enhancement'
      - 'type: enhancement'
  patch:
    labels:
      - 'patch'
      - 'bugfix'
      - 'type: bugfix'
      - 'bug'
      - 'type: bug'
      - 'fix'
      - 'type: fix'
  default: patch

# 按合并顺序排序PR
sort-by: merged_at
sort-direction: descending

# 包含预发布版本
include-pre-releases: false 