name-template: 'v$RESOLVED_VERSION 🌟'
tag-template: 'v$RESOLVED_VERSION'

include-paths:
  - '*'

exclude-contributors:
  - 'dependabot'
  - 'dependabot[bot]'

categories:
  - title: '🚀 Features'
    labels:
      - 'feature'
      - 'enhancement'
      - 'feat'
  - title: '🐛 Bug Fixes'
    labels:
      - 'fix'
      - 'bugfix'
      - 'bug'
  - title: '📚 Documentation'
    labels:
      - 'documentation'
      - 'docs'
  - title: '♻️ Refactor'
    labels:
      - 'refactor'
      - 'refactoring'
  - title: '🧪 Tests'
    labels:
      - 'test'
  - title: '🔧 Build / CI / Config'
    labels:
      - 'build'
      - 'ci'
      - 'config'
      - 'chore'
  - title: '🔌 Integrations'
    labels:
      - 'dubbo'
      - 'grpc'
      - 'spring'
      - 'nacos'
      - 'etcd'
      - 'zookeeper'
  - title: '🧱 Core Modules'
    labels:
      - 'core'
      - 'tm'
      - 'tc'
      - 'rm'
      - 'saga'
      - 'tcc'
      - 'at'
      - 'xa'

change-template: '- $TITLE @$AUTHOR (#$NUMBER)'
change-title-escapes: '\<*_&'

autolabeler:
  - label: 'feature'
    title:
      - '/^(feat|feature)(\(.+\))?:/i'
  - label: 'fix'
    title:
      - '/^(fix|bugfix)(\(.+\))?:/i'
  - label: 'documentation'
    title:
      - '/^docs(\(.+\))?:/i'
  - label: 'refactor'
    title:
      - '/^refactor(\(.+\))?:/i'
  - label: 'test'
    title:
      - '/^test(\(.+\))?:/i'
  - label: 'build'
    title:
      - '/^build(\(.+\))?:/i'
  - label: 'ci'
    title:
      - '/^ci(\(.+\))?:/i'
  - label: 'chore'
    title:
      - '/^chore(\(.+\))?:/i'

  # Core modules
  - label: 'core'
    title:
      - '/\b(core|common|base)\b/i'
  - label: 'tm'
    title:
      - '/\b(tm|transaction\.manager)\b/i'
  - label: 'tc'
    title:
      - '/\b(tc|transaction\.coordinator)\b/i'
  - label: 'rm'
    title:
      - '/\b(rm|resource\.manager)\b/i'
  - label: 'saga'
    title:
      - '/\bsaga\b/i'
  - label: 'tcc'
    title:
      - '/\btcc\b/i'
  - label: 'at'
    title:
      - '/\bat\b/i'
  - label: 'xa'
    title:
      - '/\bxa\b/i'

  # Integration
  - label: 'dubbo'
    title:
      - '/\bdubbo\b/i'
  - label: 'grpc'
    title:
      - '/\bgrpc\b/i'
  - label: 'spring'
    title:
      - '/\b(spring|springboot|boot)\b/i'
  - label: 'nacos'
    title:
      - '/\bnacos\b/i'
  - label: 'etcd'
    title:
      - '/\betcd\b/i'
  - label: 'zookeeper'
    title:
      - '/\bzookeeper\b/i'

replacers:
  - search: '/^(feat|feature|fix|bugfix|docs|style|refactor|perf|test|chore|build|ci)(\(.+\))?:\s*/i'
    replace: ''

version-resolver:
  major:
    labels:
      - 'major'
      - 'breaking'
      - 'breaking-change'
  minor:
    labels:
      - 'minor'
      - 'feature'
      - 'enhancement'
      - 'feat'
  patch:
    labels:
      - 'patch'
      - 'fix'
      - 'bugfix'
      - 'bug'
      - 'hotfix'
  default: minor

prerelease: false
prerelease-identifier: 'rc'

draft: true

template: |
  ## Apache Seata(incubating) $RESOLVED_VERSION Released.

  Apache Seata(incubating) is an easy-to-use, high-performance, open source distributed transaction solution.

  The version is updated as follows:
  
  ## 🎉 What’s Changed

  $CHANGES

  ## 🧑‍💻 Contributors

  $CONTRIBUTORS

  ## 📦 Downloads

  You can get the release from [GitHub Releases](https://github.com/$OWNER/$REPOSITORY/releases/tag/v$RESOLVED_VERSION)

  ## 📄 Documentation

  Also, we receive many valuable issues, questions and advices from our community. Thanks for you all.
  ---
  For more details, please visit [Seata Documentation](https://seata.apache.org/)
  

