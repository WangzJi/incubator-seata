# Release Drafter Configuration for Seata 2.x Development Branch
# Current stable version: v2.3.0
# Development version: v2.4.0+ (pre-release)
# Tag format: v{major}.{minor}.{patch}

name-template: 'v$RESOLVED_VERSION 🌟'
tag-template: 'v$RESOLVED_VERSION'

# Include all pull requests merged to 2.x branch
include-paths:
  - '*'

# Exclude draft and pre-release PRs from automatic processing
exclude-contributors:
  - 'dependabot'
  - 'dependabot[bot]'

categories:
  - title: '🚀 New Features'
    labels:
      - 'feature'
      - 'enhancement'
      - 'feat'
  - title: '🐛 Bug Fixes'
    labels:
      - 'fix'
      - 'bugfix'
      - 'bug'
  - title: '⚡ Performance Improvements'
    labels:
      - 'performance'
      - 'perf'
  - title: '📖 Documentation'
    labels:
      - 'documentation'
      - 'docs'
  - title: '🔧 Configuration & Build'
    labels:
      - 'build'
      - 'config'
      - 'dependencies'
  - title: '🧪 Tests'
    labels:
      - 'test'
      - 'testing'
  - title: '♻️ Code Refactoring'
    labels:
      - 'refactor'
      - 'refactoring'
  - title: '🛠️ Maintenance'
    labels:
      - 'chore'
      - 'maintenance'
      - 'internal'
  - title: '🔄 Core Components'
    labels:
      - 'core'
      - 'tm'
      - 'tc'
      - 'rm'
      - 'saga'
      - 'tcc'
      - 'at'
      - 'xa'
  - title: '🔌 Integrations'
    labels:
      - 'dubbo'
      - 'spring'
      - 'grpc'
      - 'http'
      - 'nacos'
      - 'consul'
      - 'etcd'
      - 'zookeeper'

change-template: '- $TITLE @$AUTHOR (#$NUMBER)'
change-title-escapes: '\<*_&'

# Auto-labeling based on commit message patterns (MUST come before replacers)
autolabeler:
  # Commit type based labeling (check original title before prefix removal)
  - label: 'feature'
    title:
      - '/^feat(\(.+\))?\s*:/i'
  - label: 'fix'
    title:
      - '/^fix(\(.+\))?\s*:/i'
  - label: 'documentation'
    title:
      - '/^docs(\(.+\))?\s*:/i'
  - label: 'performance'
    title:
      - '/^perf(\(.+\))?\s*:/i'
  - label: 'refactor'
    title:
      - '/^refactor(\(.+\))?\s*:/i'
  - label: 'test'
    title:
      - '/^test(\(.+\))?\s*:/i'
  - label: 'build'
    title:
      - '/^(build|ci)(\(.+\))?\s*:/i'
  - label: 'chore'
    title:
      - '/^chore(\(.+\))?\s*:/i'

  # Core modules
  - label: 'core'
    title:
      - '/\b(core|common|base)\b/i'
  - label: 'tm'
    title:
      - '/\b(tm|transaction.manager)\b/i'
  - label: 'tc'
    title:
      - '/\b(tc|transaction.coordinator)\b/i'
  - label: 'rm'
    title:
      - '/\b(rm|resource.manager)\b/i'
  - label: 'saga'
    title:
      - '/\bsaga\b/i'
  - label: 'tcc'
    title:
      - '/\btcc\b/i'
  - label: 'at'
    title:
      - '/\bat\b/i'
  - label: 'xa'
    title:
      - '/\bxa\b/i'
  
  # Configuration and discovery
  - label: 'config'
    title:
      - '/\b(config|configuration)\b/i'
  - label: 'discovery'
    title:
      - '/\b(discovery|registry)\b/i'
  - label: 'nacos'
    title:
      - '/\bnacos\b/i'
  - label: 'consul'
    title:
      - '/\bconsul\b/i'
  - label: 'etcd'
    title:
      - '/\betcd\b/i'
  - label: 'zookeeper'
    title:
      - '/\b(zookeeper|zk)\b/i'
  
  # Integration
  - label: 'dubbo'
    title:
      - '/\bdubbo\b/i'
  - label: 'spring'
    title:
      - '/\b(spring|boot)\b/i'
  - label: 'grpc'
    title:
      - '/\bgrpc\b/i'
  - label: 'http'
    title:
      - '/\bhttp\b/i'
  
  # Database and serialization
  - label: 'mysql'
    title:
      - '/\bmysql\b/i'
  - label: 'postgresql'
    title:
      - '/\b(postgresql|postgres)\b/i'
  - label: 'oracle'
    title:
      - '/\boracle\b/i'
  - label: 'serializer'
    title:
      - '/\b(serializer|serialization)\b/i'
  - label: 'compressor'
    title:
      - '/\b(compressor|compression)\b/i'

# Remove conventional commit prefixes from titles for cleaner changelog (MUST come after autolabeler)
replacers:
  - search: '/^(feat|fix|docs|style|refactor|perf|test|chore|build|ci)(\(.+\))?\s*:\s*/i'
    replace: ''

# Version resolution strategy for 2.x branch
# Current stable: v2.3.0
# Next versions: v2.4.0, v2.5.0, etc.
version-resolver:
  major:
    labels:
      - 'major'
      - 'breaking'
      - 'breaking-change'
  minor:
    labels:
      - 'minor'
      - 'feature'
      - 'enhancement'
      - 'feat'
  patch:
    labels:
      - 'patch'
      - 'fix'
      - 'bugfix'
      - 'bug'
      - 'hotfix'
  default: minor  # Default to minor for 2.x development

# Pre-release configuration
prerelease: false
prerelease-identifier: 'rc'

# Draft configuration
draft: true

template: |
  ## 🎉 What's Changed in v$RESOLVED_VERSION

  $CHANGES
  
  ## 📊 Release Statistics
  
  - **Total Changes**: $CHANGES_COUNT
  - **Contributors**: $CONTRIBUTORS_COUNT
  
  ## 🔗 Links
  
  - **Full Changelog**: https://github.com/$OWNER/$REPOSITORY/compare/$PREVIOUS_TAG...v$RESOLVED_VERSION
  - **Documentation**: https://seata.apache.org/
  - **Download**: https://github.com/$OWNER/$REPOSITORY/releases/tag/v$RESOLVED_VERSION
  
  ## 🙏 Contributors
  
  Thank you to all contributors who made this release possible!
  
  $CONTRIBUTORS
  
  ---
  
  **Note**: This is a development release from the `2.x` branch. 
  Current stable version is `v2.3.0`. Please test thoroughly before using in production.