# Simple Release Drafter Configuration for Fork Testing
name-template: 'Apache Seata v$RESOLVED_VERSION (FORK-TEST)'
tag-template: 'v$RESOLVED_VERSION-fork-test'

template: |
  # Apache Seata v$RESOLVED_VERSION (Fork Test)
  
  This is an automated changelog generated for testing purposes. 🧪
  
  ## What's Changed
  
  $CHANGES
  
  **Full Changelog**: https://github.com/$OWNER/$REPOSITORY/compare/$PREVIOUS_TAG...v$RESOLVED_VERSION

categories:
  - title: '🚀 Features'
    labels:
      - 'feature'
      - 'enhancement'
  - title: '🐛 Bug Fixes'
    labels:
      - 'bugfix'
      - 'bug'
  - title: '📖 Documentation'
    labels:
      - 'docs'
      - 'documentation'
  - title: '🧪 Testing'
    labels:
      - 'test'
      - 'testing'
  - title: '♻️ Refactoring'
    labels:
      - 'refactor'
      - 'refactoring'
  - title: '🔧 Other Changes'
    labels:
      - 'chore'
      - 'maintenance'

change-template: '- $TITLE (#$NUMBER) @$AUTHOR'
change-title-escapes: '\<*_&'

version-resolver:
  major:
    labels:
      - 'major'
      - 'breaking'
  minor:
    labels:
      - 'minor'
      - 'feature'
      - 'enhancement'
  patch:
    labels:
      - 'patch'
      - 'bugfix'
      - 'bug'
      - 'docs'
      - 'test'
      - 'refactor'
      - 'chore'
  default: patch

autolabeler:
  - label: 'feature'
    title:
      - '/^feature:/i'
  - label: 'bugfix'
    title:
      - '/^bugfix:/i'
      - '/^fix:/i'
  - label: 'docs'
    title:
      - '/^docs:/i'
  - label: 'test'
    title:
      - '/^test:/i'
  - label: 'refactor'
    title:
      - '/^refactor:/i'
  - label: 'chore'
    title:
      - '/^chore:/i' 